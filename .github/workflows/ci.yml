name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # cmd/jade/main.go uses //go:embed all:frontend/dist to bundle the
      # compiled React frontend into the Go binary. If frontend/dist does
      # not exist at build time, the embed directive errors out and every
      # subsequent Go command (including go vet) fails. Build the frontend
      # first so the embed pattern has something to match.
      - name: Install frontend deps
        working-directory: cmd/jade/frontend
        run: npm install

      - name: Build frontend
        working-directory: cmd/jade/frontend
        run: npm run build

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          files=$(gofmt -l ./core/ ./cmd/jade/*.go 2>/dev/null || true)
          if [ -n "$files" ]; then
            echo "The following files need gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Test core
        run: go test ./core/... -v -timeout 60s

      - name: Test cmd/jade (unit tests only, no CGO required)
        run: go test -tags unit ./cmd/jade/... -v -timeout 60s
